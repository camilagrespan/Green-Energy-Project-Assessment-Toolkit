name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir publish
          rsync -av --exclude='.git' --exclude='.github' --exclude='node_modules' ./ publish/

      - name: Deploy to gh-pages (JamesIves)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./publish
          clean: true
          keep_history: false
          token: ${{ secrets.GITHUB_TOKEN }}
